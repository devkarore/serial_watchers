api_platform:
    title: Hello API Platform
    version: 1.0.0
    defaults:
        pagination_items_per_page: 20
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    formats:
        jsonld:
            mime_types: ['application/ld+json']
        json:
            mime_types: ['application/json']
